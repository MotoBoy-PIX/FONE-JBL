<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Rifa JBL Tune 520BT</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <header>

            <h1>🎧 Rifa JBL Tune 520BT</h1>

            <p>
                Concorra a um Fone Bluetooth Original JBL
            </p>

        </header>

        <section class="produto">

            <img src="img/jbl.png" alt="JBL">

            <h2>JBL Tune 520BT</h2>

            <p>

                Bluetooth • Até 57 horas de bateria

            </p>

            <h3>

                Cada número custa

                <span>R$ 10,00</span>

            </h3>

        </section>

        <section>

            <h2>Escolha seus números</h2>

            <div id="numeros">

            </div>

        </section>

        <section>

            <h2>Seus números</h2>

            <div id="selecionados">

                Nenhum número selecionado

            </div>

        </section>

        <section>

            <h2>Pagamento PIX</h2>

            <img src="img/qrcode.png" alt="PIX">

            <br><br>

            <input
                id="pix"
                value="SUA CHAVE PIX"
                readonly>

            <button>

                Copiar Chave PIX

            </button>

        </section>

    </div>

    <script src="script.js"></script>

</body>

</html>
